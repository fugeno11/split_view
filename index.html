<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>3D Map Viewer — Slave</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.127/Build/Cesium/Widgets/widgets.css" rel="stylesheet"/>
  <style>
    html,body{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background:#000}
    #cesiumContainer{width:100%;height:100%}
    .cesium-viewer-bottom,.cesium-credit-logoContainer,.cesium-credit-expand-link,
    .cesium-credit-lightbox-overlay,.cesium-credit-lightbox,.cesium-widget-credits,
    .cesium-credit-textContainer,.cesium-credit-text,[class*="cesium-credit"],
    .cesium-viewer-toolbar{display:none!important}

    /* ── LIVE SYNC badge ── */
    #syncLabel{
      position:fixed; top:6px; left:50%; transform:translateX(-50%);
      z-index:200; display:flex; align-items:center; gap:6px;
      background:rgba(0,0,0,.70); border:1px solid rgba(0,229,255,.30);
      border-radius:20px; padding:3px 12px;
      font:700 10px/1.4 system-ui,sans-serif; letter-spacing:.1em; text-transform:uppercase;
      color:rgba(0,229,255,.80); pointer-events:none;
    }
    #syncLabel .dot{
      width:7px; height:7px; border-radius:50%;
      background:#444; box-shadow:none; flex-shrink:0;
      transition:background .15s, box-shadow .15s;
    }
    #syncLabel .dot.active{background:#00e5ff; box-shadow:0 0 8px #00e5ff}

    /* ── MODEL INFO LABEL (top-centre of slave pane) ── */
    #slaveInfoLabel {
      position: fixed;
      top: 38px;           /* sits just below the LIVE SYNC badge */
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: none;       /* hidden until master sends a model selection */
      flex-direction: column;
      align-items: center;
      gap: 1px;
      background: rgba(0,0,0,.80);
      border: 1.5px solid rgba(255,200,0,.55);
      border-radius: 24px;
      padding: 5px 22px 7px;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 2px 18px rgba(255,200,0,.18);
      max-width: calc(100% - 24px);
      text-align: center;
    }
    #slaveInfoLabel.visible { display: flex; }
    #slaveInfoLabel .sil-month {
      font: 700 10px/1.2 system-ui, sans-serif;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(255,200,0,.65);
    }
    #slaveInfoLabel .sil-name {
      font: 800 13px/1.4 system-ui, sans-serif;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: #ffc800;
    }
  </style>
</head>
<body>
<div id="cesiumContainer"></div>

<!-- Live sync indicator -->
<div id="syncLabel"><div class="dot" id="dot"></div>LIVE SYNC</div>

<!-- Model info label — populated from master via postMessage -->
<div id="slaveInfoLabel">
  <span class="sil-month" id="slaveMonthSpan"></span>
  <span class="sil-name"  id="slaveNameSpan"></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.127.0/Cesium.js"></script>
<script>
/* ═══════════ CONFIG ═══════════ */
const PROJECT_LOC = {lon:80.496093, lat:16.542750, height:350};
const HEIGHT_OFFSET = 60;
const ORTHO_TMS_URL = "https://amaravati-3d-data.s3.ap-southeast-2.amazonaws.com/3D_Jan2026/2D-Ortho-Geotiff/2D_ortho_AGC_Building_Zone_27012026/";

Cesium.Ion.defaultAccessToken = undefined;
const creditDiv = document.createElement("div");
creditDiv.style.display = "none";
document.body.appendChild(creditDiv);

const viewer = new Cesium.Viewer("cesiumContainer", {
  terrain:undefined, timeline:false, animation:false,
  geocoder:false, homeButton:false, sceneModePicker:false,
  baseLayerPicker:false, navigationHelpButton:false,
  infoBox:false, selectionIndicator:false,
  creditContainer:creditDiv
});

function killCredits(){
  document.querySelectorAll(
    ".cesium-viewer-bottom,.cesium-credit-logoContainer,.cesium-credit-expand-link,"+
    ".cesium-widget-credits,.cesium-credit-textContainer,.cesium-credit-text"
  ).forEach(el=>el.style.cssText="display:none!important");
}
[0,300,700,1500,3000].forEach(t=>setTimeout(killCredits,t));

/* Basemaps */
viewer.imageryLayers.removeAll();
viewer.imageryLayers.addImageryProvider(
  new Cesium.OpenStreetMapImageryProvider({url:"https://a.tile.openstreetmap.org/"})
);
(async()=>{
  try{
    const p = await Cesium.TileMapServiceImageryProvider.fromUrl(ORTHO_TMS_URL,
      {fileExtension:"png", maximumLevel:22, flipXY:false});
    viewer.imageryLayers.addImageryProvider(p);
  }catch(e){}
})();

viewer.camera.setView({
  destination:Cesium.Cartesian3.fromDegrees(PROJECT_LOC.lon,PROJECT_LOC.lat,PROJECT_LOC.height),
  orientation:{heading:0, pitch:Cesium.Math.toRadians(-35), roll:0}
});
viewer.scene.globe.depthTestAgainstTerrain = false;

/* Disable all manual camera input — slave is read-only */
const ctrl = viewer.scene.screenSpaceCameraController;
ctrl.enableRotate=false; ctrl.enableTranslate=false; ctrl.enableZoom=false;
ctrl.enableTilt=false;   ctrl.enableLook=false;

/* ═══════════ TILESETS ═══════════ */
let slaveTilesets = [];

async function slaveLoadTileset(url){
  if(!url||!url.endsWith(".json")) return;
  try{
    const ts = await Cesium.Cesium3DTileset.fromUrl(url,
      {maximumScreenSpaceError:2, maximumMemoryUsage:4096});
    slaveTilesets.push(viewer.scene.primitives.add(ts));
    await ts.readyPromise;
    const bs=ts.boundingSphere, c=Cesium.Cartographic.fromCartesian(bs.center);
    const surf=Cesium.Cartesian3.fromRadians(c.longitude,c.latitude,c.height);
    const off =Cesium.Cartesian3.fromRadians(c.longitude,c.latitude,c.height+HEIGHT_OFFSET);
    ts.modelMatrix=Cesium.Matrix4.fromTranslation(
      Cesium.Cartesian3.subtract(off,surf,new Cesium.Cartesian3()));
    viewer.scene.requestRender();
  }catch(err){console.error("Slave tileset:",err)}
}

function slaveClearTilesets(){
  slaveTilesets.forEach(ts=>viewer.scene.primitives.remove(ts));
  slaveTilesets=[];
}

/* ═══════════ SYNC DOT ═══════════ */
const dot = document.getElementById("dot");
let dotOff = null;
function flashDot(){
  dot.classList.add("active");
  clearTimeout(dotOff);
  dotOff = setTimeout(()=>dot.classList.remove("active"), 300);
}

/* ═══════════ SLAVE INFO LABEL ═══════════ */
const slaveInfoLabel  = document.getElementById("slaveInfoLabel");
const slaveMonthSpan  = document.getElementById("slaveMonthSpan");
const slaveNameSpan   = document.getElementById("slaveNameSpan");

function showSlaveLabel(month, name){
  if(month || name){
    slaveMonthSpan.textContent = month || "";
    slaveNameSpan.textContent  = name  || "";
    slaveInfoLabel.classList.add("visible");
  } else {
    slaveInfoLabel.classList.remove("visible");
    slaveMonthSpan.textContent = "";
    slaveNameSpan.textContent  = "";
  }
}

/* ═══════════ CAMERA SYNC ═══════════ */
let pending    = null;
let rafPending = false;

function applyCamera(){
  rafPending = false;
  if(!pending) return;
  const d = pending; pending = null;
  const cam = viewer.camera;
  try{
    cam.position.x  = d.px; cam.position.y  = d.py; cam.position.z  = d.pz;
    cam.direction.x = d.dx; cam.direction.y = d.dy; cam.direction.z = d.dz;
    cam.up.x        = d.ux; cam.up.y        = d.uy; cam.up.z        = d.uz;
    Cesium.Cartesian3.cross(
      new Cesium.Cartesian3(d.dx,d.dy,d.dz),
      new Cesium.Cartesian3(d.ux,d.uy,d.uz),
      cam.right
    );
    viewer.scene.requestRender();
    flashDot();
  }catch(e){
    try{
      cam.setView({
        destination: new Cesium.Cartesian3(d.px,d.py,d.pz),
        orientation:{
          direction: new Cesium.Cartesian3(d.dx,d.dy,d.dz),
          up:        new Cesium.Cartesian3(d.ux,d.uy,d.uz)
        }
      });
      viewer.scene.requestRender();
    }catch(_){}
  }
}

/* ═══════════ MESSAGE HANDLER ═══════════ */
window.addEventListener("message", e=>{
  const d = e.data;
  if(!d || !d.type) return;

  if(d.type === "CAMERA_SYNC"){
    pending = d;
    if(!rafPending){ rafPending=true; requestAnimationFrame(applyCamera); }
    return;
  }

  if(d.type === "LOAD_TILESET"  && d.url){ slaveLoadTileset(d.url); return; }
  if(d.type === "CLEAR_TILESETS"){ slaveClearTilesets(); return; }

  /* ── Model info label from master ── */
  if(d.type === "DISPLAY_MODEL_LABEL"){
    showSlaveLabel(d.month || "", d.name || "");
    return;
  }
});

/* ═══════════ READY SIGNAL ═══════════ */
let readyCount = 0;
const readyTimer = setInterval(()=>{
  try{ window.parent.postMessage({type:"SLAVE_READY"},"*"); }catch(_){}
  if(++readyCount >= 10) clearInterval(readyTimer);
}, 1000);
</script>
</body>
</html>
